name: devops-scripts workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Print hello world
        run: echo "Hello World from GitHub Actions!"
      - name: Install dependencies
        run: |
          npm install
          npm run build